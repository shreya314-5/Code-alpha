<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Music Player</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#121212;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.player{
    width:400px;
    background:#181818;
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,.5);
}

.cover{
    width:100%;
    height:220px;
    background:#282828;
    border-radius:15px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:80px;
    margin-bottom:15px;
}

.song-title{
    font-size:22px;
    font-weight:bold;
}

.artist{
    color:#b3b3b3;
    margin-top:5px;
}

#progress{
    width:100%;
    margin-top:20px;
}

.time{
    display:flex;
    justify-content:space-between;
    margin-top:5px;
    font-size:12px;
    color:#aaa;
}

.controls{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:20px;
}

.controls button{
    width:55px;
    height:55px;
    border:none;
    border-radius:50%;
    background:#1DB954;
    color:white;
    cursor:pointer;
    font-size:20px;
}

.controls button:hover{
    transform:scale(1.05);
}

.volume{
    margin-top:20px;
}

.volume input{
    width:100%;
}

.playlist{
    margin-top:20px;
    max-height:180px;
    overflow-y:auto;
}

.song{
    background:#242424;
    padding:10px;
    border-radius:8px;
    margin-bottom:6px;
    cursor:pointer;
}

.song:hover{
    background:#333;
}

.active{
    background:#1DB954 !important;
}

#player{
    position:absolute;
    left:-9999px;
}
</style>
</head>
<body>

<div class="player">

    <div class="cover">🎵</div>

    <div class="song-title" id="title">
        Click Play
    </div>

    <div class="artist" id="artist">
        Ready
    </div>

    <input
        type="range"
        id="progress"
        min="0"
        max="100"
        value="0">

    <div class="time">
        <span id="currentTime">0:00</span>
        <span id="totalTime">0:00</span>
    </div>

    <div class="controls">
        <button id="prev">⏮</button>
        <button id="play">▶</button>
        <button id="next">⏭</button>
    </div>

    <div class="volume">
        🔊 Volume
        <input
            type="range"
            id="volume"
            min="0"
            max="100"
            value="50">
    </div>

    <div class="playlist" id="playlist"></div>

</div>

<div id="player"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

// Use videos that allow embedding
const songs = [
{
    title:"NCS - Spectre",
    artist:"Alan Walker",
    videoId:"AOeY-nDp7hI"
},
{
    title:"NCS - Fade",
    artist:"Alan Walker",
    videoId:"bM7SZ5SBzyY"
},
{
    title:"NCS - Force",
    artist:"Alan Walker",
    videoId:"xshEZzpS4CQ"
}
];

let player;
let playerReady = false;
let currentSong = 0;
let isPlaying = false;

const titleEl = document.getElementById("title");
const artistEl = document.getElementById("artist");
const playlistEl = document.getElementById("playlist");

function renderPlaylist(){

    playlistEl.innerHTML = "";

    songs.forEach((song,index)=>{

        const div = document.createElement("div");

        div.className =
            index === currentSong
            ? "song active"
            : "song";

        div.innerHTML = `
            <strong>${song.title}</strong><br>
            <small>${song.artist}</small>
        `;

        div.onclick = ()=>{

            if(!playerReady) return;

            currentSong = index;

            loadSong(true);
        };

        playlistEl.appendChild(div);
    });
}

function loadSong(autoPlay = false){

    if(!playerReady) return;

    titleEl.textContent =
        songs[currentSong].title;

    artistEl.textContent =
        songs[currentSong].artist;

    renderPlaylist();

    player.loadVideoById(
        songs[currentSong].videoId
    );

    if(autoPlay){

        setTimeout(()=>{
            player.playVideo();
            isPlaying = true;
            playBtn.textContent = "⏸";
        },1000);
    }
}

function onYouTubeIframeAPIReady(){

    player = new YT.Player("player",{

        height:"1",
        width:"1",

        videoId:songs[0].videoId,

        playerVars:{
            autoplay:0,
            controls:0,
            rel:0,
            origin:window.location.origin
        },

        events:{
            onReady:onPlayerReady,
            onStateChange:onPlayerStateChange
        }
    });
}

function onPlayerReady(){

    playerReady = true;

    titleEl.textContent =
        songs[currentSong].title;

    artistEl.textContent =
        songs[currentSong].artist;

    player.setVolume(50);

    renderPlaylist();

    setInterval(updateProgress,1000);
}

function onPlayerStateChange(event){

    if(event.data === YT.PlayerState.ENDED){

        currentSong =
            (currentSong + 1)
            % songs.length;

        loadSong(true);
    }
}

const playBtn =
document.getElementById("play");

playBtn.onclick = ()=>{

    if(!playerReady) return;

    if(isPlaying){

        player.pauseVideo();

        playBtn.textContent = "▶";

        isPlaying = false;
    }
    else{

        player.playVideo();

        playBtn.textContent = "⏸";

        isPlaying = true;
    }
};

document
.getElementById("next")
.onclick = ()=>{

    if(!playerReady) return;

    currentSong =
        (currentSong + 1)
        % songs.length;

    loadSong(true);
};

document
.getElementById("prev")
.onclick = ()=>{

    if(!playerReady) return;

    currentSong =
        (currentSong - 1 + songs.length)
        % songs.length;

    loadSong(true);
};

document
.getElementById("volume")
.addEventListener("input",(e)=>{

    if(!playerReady) return;

    player.setVolume(
        e.target.value
    );
});

function updateProgress(){

    if(
        !playerReady ||
        !player.getCurrentTime
    ) return;

    const current =
        player.getCurrentTime();

    const duration =
        player.getDuration();

    if(duration){

        document
        .getElementById("progress")
        .value =
        (current / duration) * 100;

        document
        .getElementById("currentTime")
        .textContent =
        formatTime(current);

        document
        .getElementById("totalTime")
        .textContent =
        formatTime(duration);
    }
}

document
.getElementById("progress")
.addEventListener("input",(e)=>{

    if(!playerReady) return;

    const duration =
        player.getDuration();

    const seek =
        (e.target.value / 100)
        * duration;

    player.seekTo(seek,true);
});

function formatTime(seconds){

    seconds =
        Math.floor(seconds);

    const mins =
        Math.floor(seconds / 60);

    const secs =
        seconds % 60;

    return `${mins}:${secs < 10 ? "0" : ""}${secs}`;
}

</script>

</body>
</html>
